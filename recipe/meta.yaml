{% set name = "dftbplus" %}
{% set version = "25.1" %}
{% set build = 0 %}
{% set mpi = mpi or "nompi" %}

{% if mpi == "nompi" %}
{% set mpi_prefix = "nompi" %}
{% set build = build + 100 %}
{% else %}
{% set mpi_prefix = "mpi_" + mpi %}
{% endif %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  #url: https://github.com/{{ name }}/{{ name }}/releases/download/{{ version }}/dftbplus-{{ version }}.tar.xz
  url: https://github.com/aradi/dftbplus/archive/refs/heads/release-25.1.zip
  sha256: e8546efb8e7967117666827cccaf3f3a6a062a09874f07754bb53886b226f2fa

build:
  number: {{ build }}
  # The mpich version fails for uknown reasons on osx64
  skip: True  # [win or (mpi == "mpich" and osx and x86_64)]

  string: "{{ mpi_prefix }}_h{{ PKG_HASH }}_{{ build }}"

  run_exports:
    - {{ name }} * {{ mpi_prefix }}_*  # [ mpi != "nompi" ]

requirements:
  build:
    - {{ stdlib("c") }}    # [osx]
    - {{ compiler('c') }}
    - {{ compiler('cxx') }}
    - {{ compiler('fortran') }}
    - cmake
    - ninja
    - fypp
    - pkg-config
    - llvm-openmp  # [osx]
    - libgomp  # [linux]
    # OpenMPI-framework is not found otherwise when cross compiling for osx_arm64
    - {{ mpi }}  # [mpi == "openmpi" and (osx and arm64)]
    - wget  # [build_platform == target_platform]
  host:
    - {{ mpi }}  # [mpi != "nompi"]
    - mpifx * {{ mpi_prefix }}_*  # [mpi != "nompi"]
    - scalapack  # [mpi != "nompi"]
    - scalapackfx >=1.3 {{ mpi_prefix }}_*  # [mpi != "nompi"]

    - libnegf * {{ mpi_prefix }}_*
    - arpack  # [mpi == "nompi"]
    - mctc-lib ==0.3.1
    - simple-dftd3 ==1.0
    - tblite ==0.3

    # plumed on osx-arm64 has no mpi build variants
    - plumed * {{ mpi_prefix }}_*  # [mpi == "nompi" or not (osx and arm64)]
    - chimes-calculator
    - libblas
    - liblapack

    # Following packages depend on openMPI 4.0 and should be excluded if
    # DFTB+ is built with OpenMPI.
    - libmbd * {{ mpi_prefix }}_*  # [mpi != "openmpi"]
    - elsi * {{ mpi_prefix }}_*  # [mpi != "openmpi" and mpi != "nompi" and not (osx and arm64)]

  run:
    - {{ mpi }}  # [mpi != "nompi"]
    - {{ pin_compatible('mpifx', max_pin='x.x') }} {{ mpi_prefix }}_*  # [mpi != "nompi"]
    - scalapack  # [mpi != "nompi"]
    - {{ pin_compatible('scalapackfx', max_pin='x.x') }} {{ mpi_prefix }}_*  # [mpi != "nompi"]
    - {{ pin_compatible('libnegf', max_pin='x.x') }} {{ mpi_prefix }}_*
    - arpack  # [mpi == "nompi"]
    - {{ pin_compatible('mctc-lib', max_pin='x.x') }}
    - {{ pin_compatible('simple-dftd3', max_pin='x.x') }}
    - {{ pin_compatible('tblite', max_pin='x.x') }}
    - {{ pin_compatible('plumed', max_pin='x.x') }} {{ mpi_prefix }}_*  # [mpi == "nompi" or not (osx and arm64)]
    - {{ pin_compatible('chimes-calculator', max_pin='x.x') }}
    - {{ pin_compatible('libmbd', max_pin='x.x') }} {{ mpi_prefix }}_*  # [mpi != "openmpi"]
    - {{ pin_compatible('elsi', max_pin='x.x') }} {{ mpi_prefix }}_*  # [mpi != "openmpi" and mpi != "nompi" and not (osx and arm64)]
    
test:
  requires:
    - pkg-config
  commands:
    - export OMPI_MCA_plm=isolated OMPI_MCA_btl_vader_single_copy_mechanism=none OMPI_MCA_rmaps_base_oversubscribe=yes  # [mpi == "openmpi"]
    - pkg-config {{ name }} --exact-version {{ version }}
    - test -f $PREFIX/bin/dftb+
    - $PREFIX/bin/dftb+ | grep -q "No input file"  # [mpi == "nompi" and build_platform == target_platform]
    - mpiexec $PREFIX/bin/dftb+ | grep -q "No input file"  # [mpi != "nompi" and build_platform == target_platform]
    - test -f $PREFIX/lib/libdftbplus${SHLIB_EXT}

about:
  home: https://{{ name }}.org
  license: LGPL-3.0-or-later
  license_family: LGPL
  license_file:
    - "LICENSE"
    - "COPYING"
    - "COPYING.LESSER"
    - "external/fsockets/LICENSE"
    - "external/mudpack/LICENSE"
    - "external/xmlf90/LICENSE"
  summary: "DFTB+ general package for performing fast atomistic simulations"
  doc_url: https://{{ name }}-recipes.readthedocs.io
  dev_url: https://github.com/{{ name }}/{{ name }}

extra:
  recipe-maintainers:
    - aradi
    - awvwgk
    - bhourahine
